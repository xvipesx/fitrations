<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
    <defs>
        <style>
            .bg {
                fill: #000000;
            }
            .text-initials {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
                font-weight: 800;
                font-size: 240px;
                fill: #097B72;
                letter-spacing: -6px;
            }
        </style>
    </defs>
    <!-- Solid black icon body with smooth edges; everything outside this rect is transparent -->
    <rect width="512" height="512" rx="110" class="bg" />
    <!-- Centered modern initials -->
    <text x="50%" y="53%" dominant-baseline="middle" text-anchor="middle" class="text-initials">FR</text>
</svg>
